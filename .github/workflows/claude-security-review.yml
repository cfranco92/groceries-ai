name: Claude Security Review

on:
  pull_request:
    paths:
      - 'apps/api/src/modules/auth/**'
      - 'apps/api/src/common/**'
      - 'apps/api/src/prisma/**'
      - 'apps/web/src/lib/**'
      - '**/.env*'

permissions:
  pull-requests: write
  contents: read
  id-token: write

jobs:
  security-review:
    name: Security Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            SECURITY REVIEW — Critical files changed in this PR.

            Check for:
            1. Firebase JWT verification — tokens validated on every request
            2. Authorization — household membership checked, ADMIN role for sensitive ops
            3. Input sanitization — all DTOs use class-validator, no raw SQL
            4. Secrets exposure — no API keys, passwords, or tokens in code
            5. Cloud Storage — signed URLs only, no public bucket access
            6. CORS — whitelist specific origins, no wildcard in production
            7. Rate limiting — throttle on sensitive endpoints (auth, upload)
            8. Prisma — parameterized queries only, no `$queryRaw` with user input

            Flag any issue as 🔴 CRITICAL, 🟡 WARNING, or 🔵 INFO.
